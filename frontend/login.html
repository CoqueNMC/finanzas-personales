<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Finanzas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <style>
    :root {
      --bg:#0a0a0f; --bg2:#111118; --bg3:#18181f; --bg4:#1e1e28;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#f0f0f5; --text2:#8888a0; --text3:#55556a;
      --accent:#7c6aff; --accent2:#a594ff; --accent-dim:rgba(124,106,255,0.15);
      --green:#22d48f; --red:#ff5e7a;
      --radius:14px; --radius-sm:8px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:40px; width:420px; max-width:95vw; }
    .logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .logo-icon { width:40px; height:40px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .logo-text { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; }
    .logo-sub { font-size:12px; color:var(--text3); }
    .tab-btns { display:flex; gap:4px; background:var(--bg3); border-radius:var(--radius-sm); padding:4px; margin-bottom:28px; }
    .tab-btn { flex:1; padding:8px; border:none; background:transparent; color:var(--text3); border-radius:6px; cursor:pointer; font-family:'DM Sans'; font-size:13px; font-weight:500; transition:all .15s; }
    .tab-btn.active { background:var(--bg2); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.3); }
    .form-group { margin-bottom:16px; }
    .form-label { font-size:11px; font-weight:600; color:var(--text3); margin-bottom:6px; display:block; letter-spacing:.06em; text-transform:uppercase; }
    .form-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 14px; font-size:14px; color:var(--text); font-family:'DM Sans'; outline:none; transition:border-color .15s; }
    .form-input:focus { border-color:var(--accent); }
    .btn-primary { width:100%; background:var(--accent); color:white; border:none; border-radius:var(--radius-sm); padding:12px; font-size:14px; font-weight:500; cursor:pointer; font-family:'DM Sans'; transition:opacity .15s; margin-top:8px; }
    .btn-primary:hover { opacity:.85; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .error-msg { background:rgba(255,94,122,0.1); border:1px solid rgba(255,94,122,0.3); border-radius:var(--radius-sm); padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:none; }
    .error-msg.show { display:block; }
    .forgot-link { text-align:right; margin-top:-8px; margin-bottom:16px; }
    .forgot-link a { font-size:12px; color:var(--accent2); cursor:pointer; text-decoration:none; }
    .forgot-link a:hover { text-decoration:underline; }
    .success-msg { background:rgba(34,212,143,0.1); border:1px solid rgba(34,212,143,0.3); border-radius:var(--radius-sm); padding:10px 14px; font-size:13px; color:var(--green); margin-bottom:16px; display:none; }
    .success-msg.show { display:block; }
    .register-disabled { text-align:center; font-size:13px; color:var(--text3); margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div>
      <div class="logo-text">Finanzas</div>
      <div class="logo-sub">Personal</div>
    </div>
  </div>

  <div class="tab-btns" id="tab-btns">
    <button class="tab-btn active" onclick="showTab('login')">Iniciar sesión</button>
    <button class="tab-btn" onclick="showTab('register')" id="tab-register-btn">Registrarse</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- LOGIN -->
  <div id="tab-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="forgot-link"><a onclick="showTab('forgot')">¿Olvidaste tu contraseña?</a></div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Iniciar sesión</button>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" style="display:none">
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-input" type="text" id="reg-name" placeholder="Tu nombre">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="reg-email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
    </div>
    <button class="btn-primary" id="btn-register" onclick="doRegister()">Crear cuenta</button>
    <div class="register-disabled" id="register-disabled" style="display:none">
      El registro está desactivado. Contacta al administrador.
    </div>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="tab-forgot" style="display:none">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="forgot-email" placeholder="tu@email.com">
    </div>
    <button class="btn-primary" onclick="doForgot()">Enviar instrucciones</button>
    <div style="text-align:center;margin-top:16px;">
      <a onclick="showTab('login')" style="font-size:13px;color:var(--accent2);cursor:pointer;">← Volver al login</a>
    </div>
  </div>

  <!-- RESET PASSWORD -->
  <div id="tab-reset" style="display:none">
    <div class="form-group">
      <label class="form-label">Nueva contraseña</label>
      <input class="form-input" type="password" id="reset-password" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar contraseña</label>
      <input class="form-input" type="password" id="reset-password2" placeholder="Repite la contraseña">
    </div>
    <button class="btn-primary" onclick="doReset()">Restablecer contraseña</button>
  </div>
</div>

<script type="module">

const BASE_PATH = window.location.hostname === "localhost"
  ? ""
  : "/finanzas-personales";

const BASE_URL = window.location.hostname === "localhost"
  ? "http://localhost:8000/api/v1"
  : "https://finanzas-personales-uzs9.onrender.com/api/v1";

async function request(method, path, body = null) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${BASE_URL}${path}`, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
  return data;
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg; el.classList.add("show");
  document.getElementById("success-msg").classList.remove("show");
}

function showSuccess(msg) {
  const el = document.getElementById("success-msg");
  el.textContent = msg; el.classList.add("show");
  document.getElementById("error-msg").classList.remove("show");
}

function clearMsgs() {
  document.getElementById("error-msg").classList.remove("show");
  document.getElementById("success-msg").classList.remove("show");
}

window.showTab = (tab) => {
  clearMsgs();
  ["login","register","forgot","reset"].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? "" : "none";
  });
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  if (tab === "login") document.querySelectorAll(".tab-btn")[0].classList.add("active");
  if (tab === "register") document.querySelectorAll(".tab-btn")[1].classList.add("active");
};

window.doLogin = async () => {
  clearMsgs();
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  if (!email || !password) return showError("Completa todos los campos");
  const btn = document.getElementById("btn-login");
  btn.disabled = true; btn.textContent = "Iniciando sesión...";
  try {
    const data = await request("POST", "/auth/login/", { email, password });
    sessionStorage.setItem("auth_token", data.access_token);
    sessionStorage.setItem("auth_user", JSON.stringify(data.user));
    window.location.href = `${BASE_PATH}/index.html`;
  } catch(e) {
    showError(e.message);
    btn.disabled = false; btn.textContent = "Iniciar sesión";
  }
};

window.doRegister = async () => {
  clearMsgs();
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const password = document.getElementById("reg-password").value;
  if (!name || !email || !password) return showError("Completa todos los campos");
  if (password.length < 6) return showError("La contraseña debe tener al menos 6 caracteres");
  const btn = document.getElementById("btn-register");
  btn.disabled = true; btn.textContent = "Creando cuenta...";
  try {
    const data = await request("POST", "/auth/register/", { name, email, password });
    sessionStorage.setItem("auth_token", data.access_token);
    sessionStorage.setItem("auth_user", JSON.stringify(data.user));
    window.location.href = `${BASE_PATH}/index.html`;
  } catch(e) {
    if (e.message.includes("desactivado")) {
      document.getElementById("register-disabled").style.display = "";
      document.getElementById("btn-register").style.display = "none";
    } else {
      showError(e.message);
    }
    btn.disabled = false; btn.textContent = "Crear cuenta";
  }
};

window.doForgot = async () => {
  clearMsgs();
  const email = document.getElementById("forgot-email").value.trim();
  if (!email) return showError("Ingresa tu email");
  try {
    await request("POST", "/auth/forgot-password/", { email });
    showSuccess("Si el email existe recibirás instrucciones en tu correo.");
  } catch(e) { showError(e.message); }
};

window.doReset = async () => {
  clearMsgs();
  const password = document.getElementById("reset-password").value;
  const password2 = document.getElementById("reset-password2").value;
  if (!password || !password2) return showError("Completa todos los campos");
  if (password !== password2) return showError("Las contraseñas no coinciden");
  if (password.length < 6) return showError("Mínimo 6 caracteres");
  const token = new URLSearchParams(window.location.search).get("token");
  if (!token) return showError("Token inválido");
  try {
    await request("POST", "/auth/reset-password/", { token, new_password: password });
    showSuccess("Contraseña restablecida. Redirigiendo...");
    setTimeout(() => showTab("login"), 2000);
  } catch(e) { showError(e.message); }
};

// Verificar si ya está logueado
if (sessionStorage.getItem("auth_token")) {
  window.location.href = `${BASE_PATH}/index.html`;
}

// Verificar si viene con token de reset
const resetToken = new URLSearchParams(window.location.search).get("token");
if (resetToken) showTab("reset");
</script>
</body>
</html>
